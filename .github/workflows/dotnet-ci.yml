name: .NET CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Restore and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.203'

      - name: Display .NET version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore mega-fintrade-risk-monitor-dotnet.sln

      - name: Build solution
        run: dotnet build mega-fintrade-risk-monitor-dotnet.sln --configuration Release --no-restore